name: Generar blog

on:
  push:
    paths:
      - '_posts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generar indice y posts
        run: |
          node generar-indice.js
          node generar-posts.js

      - name: Commit cambios
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _posts/index.json blog/
          git diff --staged --quiet || git commit -m "Auto: actualizar blog"
          git push