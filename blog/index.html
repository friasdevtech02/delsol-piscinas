<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const tagEmoji = {
  'Mantenimiento': '💧',
  'Instalación': '🏗️',
  'Consejos': '✅',
  'Novedades': '🌟',
};

function renderCard(post) {
  const thumb = post.image
    ? `<div class="blog-thumb blog-thumb-img">
         <img src="${post.image}" alt="${post.title}" style="width:100%;height:100%;object-fit:cover;display:block;">
       </div>`
    : `<div class="blog-thumb">${post.emoji || tagEmoji[post.tag] || '📝'}</div>`;

  return `
    <article class="blog-card">
      ${thumb}
      <div class="blog-body">
        <p class="blog-tag">${post.tag}</p>
        <h2><a href="${post.slug}.html">${post.title}</a></h2>
        <p>${marked.parse(post.excerpt)}</p>
        <a href="${post.slug}.html" class="blog-read">Leer más <span class="arrow">→</span></a>
      </div>
    </article>
  `;
}

async function loadPosts() {
  const grid = document.getElementById('blog-grid');
  try {
    const res = await fetch('../_posts/index.json');
    if (!res.ok) throw new Error('sin posts');
    const posts = await res.json();
    if (!posts.length) {
      grid.innerHTML = '<p style="color:var(--muted)">Próximamente nuevos artículos.</p>';
      return;
    }
    // Muestra TODOS los artículos
    grid.innerHTML = posts.map(renderCard).join('');
  } catch (e) {
    grid.innerHTML = '<p style="color:var(--muted)">No se pudieron cargar los artículos.</p>';
  }
}

loadPosts();
</script>
